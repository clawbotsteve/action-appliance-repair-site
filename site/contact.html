<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Action Appliance Repair | Phoenix, AZ</title>
  <meta name="description" content="Contact Action Appliance Repair in Phoenix Metro. Book-first support, fast callbacks, and same-day service Monday through Saturday." />

  <!-- Analytics placeholders: replace with your real IDs -->
  <!-- Google Tag Manager: GTM-XXXXXXX -->
  <!-- Google Analytics 4 Measurement ID: G-XXXXXXXXXX -->

    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);} 
    // gtag('js', new Date());
    // gtag('config', 'G-XXXXXXXXXX');
  </script>
  <link rel="canonical" href="https://actionappliancerepairphoenix.com/contact.html" />
</head>
<body style="font-family:Arial,sans-serif;max-width:760px;margin:40px auto;padding:0 16px;line-height:1.5;">
  <h1>Contact Action Appliance Repair</h1>
  <p><strong>Phone:</strong> <a href="tel:+14807168855">(480) 716-8855</a></p>
  <p><strong>Hours:</strong> Monday-Saturday, 8:00 AM-6:00 PM</p>
  <p>Prefer online scheduling? <a href="booking.html" id="bookNowLink">Book your service now</a>.</p>

  <form id="contactForm" style="display:grid;gap:10px;margin-top:20px;">
    <input required name="name" placeholder="Full Name" />
    <input required name="phone" placeholder="Phone Number" />
    <input name="appliance" placeholder="Appliance Type (e.g., Refrigerator)" />
    <input name="city" placeholder="City / ZIP" />
    <textarea name="issue" placeholder="What issue are you having?" rows="5"></textarea>
    <input name="preferred" placeholder="Preferred Date/Time" />
    <button type="submit">Send Request</button>
  </form>

  <p id="ok" style="display:none;color:#0a7a31;font-weight:600;">Thanks! We received your request and will call/text you shortly.</p>

  <script>
    function trackEvent(eventName, payload) {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push(Object.assign({ event: eventName, page: window.location.pathname }, payload || {}));
    }

    document.querySelectorAll('a[href^="tel:"]').forEach(function (link) {
      link.addEventListener('click', function () {
        trackEvent('call_click', { location: 'contact_page', phone: this.getAttribute('href') });
      });
    });

    var bookNowLink = document.getElementById('bookNowLink');
    if (bookNowLink) {
      bookNowLink.addEventListener('click', function () {
        trackEvent('book_click', { location: 'contact_page', href: 'booking.html' });
      });
    }

    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      trackEvent('form_submit', { form: 'contact' });
      document.getElementById('ok').style.display = 'block';
      this.reset();
    });
  </script>
</body>
</html>
